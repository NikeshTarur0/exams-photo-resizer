<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Emerald Glow Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Cyan Sparkle Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Soft Inner Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer Rounded Square Container -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" stroke="#334155" stroke-width="4"/>

  <!-- Glowing Outer Crop Frame Lines -->
  <g filter="url(#shadow)">
    <!-- Top-Left Crop Corner -->
    <path d="M 120 180 L 120 140 C 120 128.95 128.95 120 140 120 L 180 120" stroke="url(#emeraldGrad)" stroke-width="24" stroke-linecap="round" fill="none" />
    <!-- Top-Right Crop Corner -->
    <path d="M 332 120 L 372 120 C 383.05 120 392 128.95 392 140 L 392 180" stroke="url(#emeraldGrad)" stroke-width="24" stroke-linecap="round" fill="none" />
    <!-- Bottom-Left Crop Corner -->
    <path d="M 120 332 L 120 372 C 120 383.05 128.95 392 140 392 L 180 392" stroke="url(#emeraldGrad)" stroke-width="24" stroke-linecap="round" fill="none" />
    <!-- Bottom-Right Crop Corner -->
    <path d="M 332 392 L 372 392 C 383.05 392 392 383.05 392 372 L 392 332" stroke="url(#emeraldGrad)" stroke-width="24" stroke-linecap="round" fill="none" />
  </g>

  <!-- Center Passport Photo Shield / Card -->
  <rect x="160" y="160" width="192" height="192" rx="24" fill="#1e293b" stroke="url(#cyanGrad)" stroke-width="6" filter="url(#shadow)"/>

  <!-- Inner Camera / Eye / Person Silhouette with Graduation Cap overlay -->
  <!-- Person Head -->
  <circle cx="256" cy="225" r="32" fill="url(#emeraldGrad)"/>

  <!-- Person Shoulders -->
  <path d="M 200 310 C 200 270 230 262 256 262 C 282 262 312 270 312 310 Z" fill="url(#emeraldGrad)"/>

  <!-- Graduation Mortarboard Cap Accent above Head -->
  <path d="M 256 168 L 298 186 L 256 204 L 214 186 Z" fill="url(#cyanGrad)"/>
  <path d="M 290 190 L 290 210" stroke="url(#cyanGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Dimension Target Badge (e.g. 50KB / Compliant Checkmark) -->
  <circle cx="340" cy="340" r="32" fill="#10b981" filter="url(#glow)"/>
  <path d="M 326 340 L 336 350 L 354 330" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
